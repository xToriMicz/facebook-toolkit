<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1877F2"/>
      <stop offset="50%" style="stop-color:#4f6ef7"/>
      <stop offset="100%" style="stop-color:#3b5de7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="60%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="520" rx="224" fill="url(#shine)"/>

  <!-- Gear icon (left) -->
  <g transform="translate(180, 240)" filter="url(#shadow)">
    <circle cx="170" cy="170" r="75" fill="none" stroke="white" stroke-width="28" opacity="0.95"/>
    <circle cx="170" cy="170" r="30" fill="white" opacity="0.95"/>
    <g fill="white" opacity="0.95">
      <rect x="154" y="72" width="32" height="36" rx="8"/>
      <rect x="154" y="232" width="32" height="36" rx="8"/>
      <rect x="72" y="154" width="36" height="32" rx="8"/>
      <rect x="232" y="154" width="36" height="32" rx="8"/>
      <rect x="95" y="95" width="28" height="28" rx="6" transform="rotate(45,109,109)"/>
      <rect x="217" y="95" width="28" height="28" rx="6" transform="rotate(45,231,109)"/>
      <rect x="95" y="217" width="28" height="28" rx="6" transform="rotate(45,109,231)"/>
      <rect x="217" y="217" width="28" height="28" rx="6" transform="rotate(45,231,231)"/>
    </g>
  </g>

  <!-- Post/send icon (right) -->
  <g transform="translate(500, 260)" filter="url(#shadow)">
    <rect x="30" y="10" width="210" height="270" rx="24" fill="none" stroke="white" stroke-width="22" opacity="0.95"/>
    <rect x="72" y="76" width="130" height="14" rx="7" fill="white" opacity="0.8"/>
    <rect x="72" y="112" width="95" height="14" rx="7" fill="white" opacity="0.6"/>
    <rect x="72" y="148" width="115" height="14" rx="7" fill="white" opacity="0.7"/>
    <!-- Send arrow -->
    <g opacity="0.95">
      <polygon points="190,200 280,244 190,288" fill="white"/>
      <rect x="110" y="232" width="110" height="24" rx="8" fill="white"/>
    </g>
  </g>

  <!-- TOOLKIT text -->
  <text x="512" y="870" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="148" font-weight="800" fill="white" opacity="0.92" letter-spacing="12">TOOLKIT</text>
</svg>
