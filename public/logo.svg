<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1877F2"/>
      <stop offset="100%" style="stop-color:#0D5DC7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect width="1024" height="512" rx="220" fill="url(#shine)"/>

  <!-- Wrench/tool icon (left) -->
  <g transform="translate(200, 280) scale(1.1)" fill="white" opacity="0.95">
    <!-- Gear -->
    <circle cx="160" cy="160" r="70" fill="none" stroke="white" stroke-width="32"/>
    <circle cx="160" cy="160" r="28" fill="white"/>
    <!-- Gear teeth -->
    <rect x="144" y="70" width="32" height="40" rx="6" fill="white"/>
    <rect x="144" y="210" width="32" height="40" rx="6" fill="white"/>
    <rect x="70" y="144" width="40" height="32" rx="6" fill="white"/>
    <rect x="210" y="144" width="40" height="32" rx="6" fill="white"/>
    <!-- Diagonal teeth -->
    <rect x="90" y="90" width="32" height="32" rx="6" fill="white" transform="rotate(45, 106, 106)"/>
    <rect x="200" y="90" width="32" height="32" rx="6" fill="white" transform="rotate(45, 216, 106)"/>
    <rect x="90" y="200" width="32" height="32" rx="6" fill="white" transform="rotate(45, 106, 216)"/>
    <rect x="200" y="200" width="32" height="32" rx="6" fill="white" transform="rotate(45, 216, 216)"/>
  </g>

  <!-- Post/send icon (right) -->
  <g transform="translate(480, 300) scale(1.2)" fill="white" opacity="0.95">
    <!-- Paper/document -->
    <rect x="40" y="20" width="200" height="260" rx="20" fill="none" stroke="white" stroke-width="24"/>
    <!-- Lines on paper -->
    <rect x="80" y="80" width="120" height="16" rx="8" fill="white"/>
    <rect x="80" y="120" width="90" height="16" rx="8" fill="white"/>
    <rect x="80" y="160" width="110" height="16" rx="8" fill="white"/>
    <!-- Send arrow -->
    <polygon points="200,200 280,240 200,280" fill="white"/>
    <rect x="120" y="228" width="100" height="24" rx="6" fill="white"/>
  </g>

  <!-- "fb" text at bottom -->
  <text x="512" y="860" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="160" font-weight="900" fill="white" opacity="0.9" letter-spacing="8">TOOLKIT</text>
</svg>
