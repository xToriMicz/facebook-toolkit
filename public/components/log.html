      <div id="tabActivityLog" class="hidden">
        <!-- Stats Cards -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
          <div class="card" style="padding:14px;text-align:center;margin:0"><div style="font-size:1.2rem;font-weight:800;color:var(--accent)" id="logStatTotal">—</div><div style="font-size:0.68rem;color:var(--sec)">ทั้งหมด</div></div>
          <div class="card" style="padding:14px;text-align:center;margin:0"><div style="font-size:1.2rem;font-weight:800;color:var(--success)" id="logStatPosts">—</div><div style="font-size:0.68rem;color:var(--sec)">📝 โพส</div></div>
          <div class="card" style="padding:14px;text-align:center;margin:0"><div style="font-size:1.2rem;font-weight:800;color:#a78bfa" id="logStatAI">—</div><div style="font-size:0.68rem;color:var(--sec)">🤖 AI</div></div>
          <div class="card" style="padding:14px;text-align:center;margin:0"><div style="font-size:1.2rem;font-weight:800;color:var(--warning)" id="logStatSchedule">—</div><div style="font-size:0.68rem;color:var(--sec)">⏰ ตั้งเวลา</div></div>
        </div>

        <div class="card">
          <div class="card-title"><span class="card-title-icon">📋</span> Activity Log</div>

          <!-- Search + Date -->
          <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
            <input type="text" id="logSearch" oninput="filterLogs(currentLogFilter,null)" placeholder="🔍 ค้นหา..." style="flex:1;min-width:120px;padding:8px 12px;background:var(--input);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:0.82rem;font-family:inherit">
            <input type="date" id="logDate" onchange="filterLogs(currentLogFilter,null)" style="padding:8px 10px;background:var(--input);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:0.82rem;font-family:inherit">
          </div>

          <div class="log-filter" id="logFilter">
            <button class="log-filter-btn active" onclick="filterLogs('all',this)">ทั้งหมด</button>
            <button class="log-filter-btn" onclick="filterLogs('login',this)">🔑 เข้าสู่ระบบ</button>
            <button class="log-filter-btn" onclick="filterLogs('post_created',this)">📝 โพส</button>
            <button class="log-filter-btn" onclick="filterLogs('post_scheduled',this)">⏰ ตั้งเวลา</button>
            <button class="log-filter-btn" onclick="filterLogs('ai_write',this)">🤖 AI</button>
            <button class="log-filter-btn" onclick="filterLogs('settings_changed',this)">⚙️ ตั้งค่า</button>
            <button class="log-filter-btn" onclick="filterLogs('auto_reply',this)">💬 Auto Reply</button>
          </div>
          <div id="logList"><div class="empty-state"><div style="display:flex;flex-direction:column;gap:10px"><div class="skel" style="height:14px;width:60%"></div><div class="skel" style="height:50px;width:100%"></div><div class="skel" style="height:14px;width:40%"></div></div></div></div>
        </div>
      </div>
